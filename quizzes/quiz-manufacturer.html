<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Manufacturer Operations Audit — JoeLuT AI</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #3FB8C4;
    --accent2: #00D4FF;
    --dark: #080C10;
    --surface: #0D1218;
    --card: #111820;
    --border: #1E2D3A;
    --text: #FFFFFF;
    --muted: #6B8799;
    --warn: #E8943A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: "Barlow", sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(63,184,196,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container { width: 100%; max-width: 640px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 40px; animation: fadeUp 0.6s ease both; }
  .logo-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(63,184,196,0.4);
    padding: 5px 14px;
    margin-bottom: 20px;
    border-radius: 2px;
  }
  h1 { font-family: "Barlow Condensed", sans-serif; font-size: clamp(32px, 7vw, 52px); font-weight: 800; line-height: 1.05; color: var(--text); margin-bottom: 12px; letter-spacing: -0.01em; text-transform: uppercase; }
  h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 460px; margin: 0 auto; font-weight: 400; }
  .progress-wrap { margin-bottom: 32px; animation: fadeUp 0.6s 0.1s ease both; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }
  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 36px; animation: fadeUp 0.5s ease both; position: relative; overflow: hidden; }
  .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .question-num { font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; font-weight: 600; }
  .question-text { font-family: "Barlow Condensed", sans-serif; font-size: clamp(20px, 4vw, 28px); font-weight: 700; line-height: 1.25; margin-bottom: 28px; color: var(--text); text-transform: uppercase; letter-spacing: 0.01em; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 15px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    font-family: "Barlow", sans-serif;
    font-size: 14px;
    color: #AABCC8;
    line-height: 1.5;
    font-weight: 400;
  }
  .option:hover { border-color: rgba(63,184,196,0.5); background: rgba(63,184,196,0.05); transform: translateX(3px); color: var(--text); }
  .option.selected { border-color: var(--accent); background: rgba(63,184,196,0.08); color: var(--text); }
  .option-key { font-size: 10px; color: var(--accent); font-weight: 700; flex-shrink: 0; width: 16px; padding-top: 2px; letter-spacing: 0.05em; }
  .option.selected .option-key { color: var(--accent2); }
  .nav { display: flex; gap: 12px; margin-top: 28px; justify-content: flex-end; }
  .btn { font-family: "Barlow", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 12px 28px; border-radius: 4px; cursor: pointer; transition: all 0.2s ease; border: none; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: var(--dark); font-weight: 800; }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; animation: fadeUp 0.6s ease both; }
  .result-header { padding: 36px; position: relative; border-bottom: 1px solid var(--border); }
  .tier-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; padding: 5px 14px; border-radius: 2px; margin-bottom: 20px; }
  .result-score { font-family: "Barlow Condensed", sans-serif; font-size: 80px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .result-label { font-family: "Barlow Condensed", sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.02em; }
  .result-desc { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 480px; font-weight: 400; }
  .score-bar-wrap { margin-top: 24px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s; }
  .audit-section { padding: 28px 36px; border-bottom: 1px solid var(--border); }
  .audit-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; font-weight: 700; }
  .cat-row { margin-bottom: 14px; }
  .cat-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .cat-name { font-size: 13px; color: #AABCC8; font-weight: 500; }
  .cat-pct { font-size: 13px; font-weight: 700; }
  .cat-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s; }
  .opp-section { padding: 28px 36px; border-bottom: 1px solid var(--border); }
  .opp-item { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px 18px; margin-bottom: 10px; }
  .opp-cat { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .opp-rec { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .cta-section { padding: 28px 36px; }
  .cta-title { font-family: "Barlow Condensed", sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.02em; }
  .cta-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .cta-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-cta { font-family: "Barlow", sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px 28px; border-radius: 4px; cursor: pointer; transition: all 0.2s ease; border: none; text-decoration: none; display: inline-block; }
  .btn-calendly { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: var(--dark); }
  .btn-calendly:hover { opacity: 0.88; transform: translateY(-2px); }
  .btn-restart { background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: "Barlow", sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 28px; border-radius: 4px; transition: all 0.2s; }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .slide-in { animation: fadeUp 0.4s ease both; }
  .footer { text-align: center; margin-top: 28px; font-size: 11px; color: var(--muted); animation: fadeUp 0.6s 0.2s ease both; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
  @media (max-width: 480px) {
    .card { padding: 24px; }
    .result-header { padding: 24px; }
    .audit-section, .opp-section, .cta-section { padding: 20px 24px; }
    .result-score { font-size: 60px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-tag">JoeLuT AI &middot; Manufacturing Audit</div>
    <h1>Food Manufacturer<br><span>Operations Audit</span></h1>
    <p class="subtitle">12 questions. 3 minutes. Find out where your production process is costing you the most time and money.</p>
  </div>
  <div id="progress-wrap" class="progress-wrap" style="display:none;">
    <div class="progress-meta">
      <span id="progress-label">Question 1 of 12</span>
      <span id="progress-cat"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div id="quiz-area"></div>
  <div class="footer">Powered by JoeLuT AI &middot; joelutai.com</div>
</div>

<script>
  const QUESTIONS = [
    {
      id: 1, category: 'Compliance & Traceability',
      text: "If the FDA showed up tomorrow and asked you to trace an ingredient back to its supplier, lot number, and receiving date, how fast could your team pull that up?",
      options: [
        { label: 'Under 5 minutes from a digital system', score: 4 },
        { label: '30 minutes searching records', score: 3 },
        { label: 'Half a day going through files', score: 2 },
        { label: 'We would struggle to do it at all', score: 1 },
      ]
    },
    {
      id: 2, category: 'Compliance & Traceability',
      text: "How do you track and store supplier certifications, allergen documentation, and food safety records?",
      options: [
        { label: 'Dedicated digital system with alerts for expirations', score: 4 },
        { label: 'Organized folders or shared drive', score: 3 },
        { label: 'Paper files or scattered across email', score: 2 },
        { label: "We collect them but don\u2019t have a consistent system", score: 1 },
      ]
    },
    {
      id: 3, category: 'Production Tracking',
      text: "How do you track production runs, batch schedules, and what was produced each day?",
      options: [
        { label: 'Digital production management system', score: 4 },
        { label: 'Spreadsheets updated manually', score: 3 },
        { label: 'Paper logs or whiteboards', score: 2 },
        { label: 'Mostly from memory or verbal updates', score: 1 },
      ]
    },
    {
      id: 4, category: 'Production Tracking',
      text: "When something goes wrong in a batch, how quickly can you identify which ingredients, quantities, and steps were involved?",
      options: [
        { label: 'Instantly from a digital batch record', score: 4 },
        { label: 'Within an hour from spreadsheets', score: 3 },
        { label: 'Takes most of a day digging through records', score: 2 },
        { label: "We often can\u2019t trace it fully", score: 1 },
      ]
    },
    {
      id: 5, category: 'Costing & Margins',
      text: "Do you know the real per-unit cost of every product you make, including ingredients, labor, packaging, and overhead?",
      options: [
        { label: 'Yes, calculated automatically with current prices', score: 4 },
        { label: 'Yes, from a spreadsheet we update periodically', score: 3 },
        { label: 'We have rough estimates', score: 2 },
        { label: 'Not accurately, no', score: 1 },
      ]
    },
    {
      id: 6, category: 'Costing & Margins',
      text: "When ingredient prices change, how do you update your product pricing?",
      options: [
        { label: 'Automatically flagged and recalculated', score: 4 },
        { label: 'We manually recalculate when we notice', score: 3 },
        { label: 'We adjust prices when margins feel tight', score: 2 },
        { label: 'We rarely update until it becomes a problem', score: 1 },
      ]
    },
    {
      id: 7, category: 'Inventory & Sourcing',
      text: "How do you track ingredient inventory levels and know when to reorder?",
      options: [
        { label: 'Digital inventory system with reorder alerts', score: 4 },
        { label: 'Spreadsheet we check regularly', score: 3 },
        { label: "Physical counts when we think we\u2019re running low", score: 2 },
        { label: "We often find out we\u2019re short during production", score: 1 },
      ]
    },
    {
      id: 8, category: 'Inventory & Sourcing',
      text: "Can you quickly see which supplier provided which ingredient lot and at what cost?",
      options: [
        { label: 'Yes, linked in our system', score: 4 },
        { label: "Yes, but I\u2019d need to check invoices manually", score: 3 },
        { label: 'Sometimes, if we kept the paperwork', score: 2 },
        { label: 'Not reliably', score: 1 },
      ]
    },
    {
      id: 9, category: 'Recipe & Scaling',
      text: "How do you scale recipes from test batch to production quantities?",
      options: [
        { label: 'Software handles the conversion automatically', score: 4 },
        { label: 'Spreadsheet with formulas', score: 3 },
        { label: 'We do the math manually each time', score: 2 },
        { label: 'Rough estimates and adjust during production', score: 1 },
      ]
    },
    {
      id: 10, category: 'Recipe & Scaling',
      text: "How do you manage recipe versions when you make changes to a formula?",
      options: [
        { label: 'Version-controlled in a digital system', score: 4 },
        { label: 'Updated spreadsheet or document', score: 3 },
        { label: 'Notes written on the original recipe', score: 2 },
        { label: "We don\u2019t always track changes", score: 1 },
      ]
    },
    {
      id: 11, category: 'Capacity & Growth',
      text: "How close are you to maximum production capacity?",
      options: [
        { label: 'Under 50% \u2014 plenty of room to grow', score: 4 },
        { label: '50\u201375% \u2014 growing steadily', score: 3 },
        { label: '75\u201390% \u2014 starting to feel the strain', score: 2 },
        { label: 'Over 90% \u2014 turning away orders or running behind', score: 1 },
      ]
    },
    {
      id: 12, category: 'Capacity & Growth',
      text: "What is the biggest bottleneck preventing you from scaling?",
      options: [
        { label: 'Nothing major \u2014 operations are smooth', score: 4 },
        { label: 'Finding and training production staff', score: 3 },
        { label: 'Managing the admin and paperwork around production', score: 2 },
        { label: 'Everything runs through me personally', score: 1 },
      ]
    },
  ];

  const CATEGORIES = [
    'Compliance & Traceability',
    'Production Tracking',
    'Costing & Margins',
    'Inventory & Sourcing',
    'Recipe & Scaling',
    'Capacity & Growth',
  ];

  const CATEGORY_RECOMMENDATIONS = {
    'Compliance & Traceability': 'FSMA 204 enforcement started January 2026. Small food manufacturers are getting the most scrutiny. A digital traceability system linking ingredients, lot numbers, suppliers, and batch records would make you audit-ready in minutes instead of days.',
    'Production Tracking': 'A digital batch tracking system would give you instant visibility into what was produced, when, with which ingredients, and flag issues before they become costly recalls.',
    'Costing & Margins': 'An automated COG calculator that updates with current ingredient prices would catch margin erosion before it eats your profit. Most manufacturers discover they\u2019ve been underpricing products for months.',
    'Inventory & Sourcing': 'Automated inventory tracking with reorder alerts and supplier lot linking would eliminate stockouts during production and give you full ingredient traceability.',
    'Recipe & Scaling': 'Recipe management with automatic scaling and version control would remove manual conversion errors and ensure consistency across production runs.',
    'Capacity & Growth': 'Systemizing your production operations would allow you to increase output without proportionally increasing headcount or admin burden.',
  };

  const MAX_SCORE = 48;

  const GRADES = [
    { min: 42, label: 'A', title: 'Optimized Operation', color: '#3FB8C4', badge: 'GRADE A \u2014 OPTIMIZED', desc: 'Your manufacturing operation is well-systemized. You have strong processes across compliance, costing, and production tracking. Focus on scaling and optimization.' },
    { min: 34, label: 'B', title: 'Solid Foundation', color: '#3FB8C4', badge: 'GRADE B \u2014 SOLID FOUNDATION', desc: 'You have good processes but there are gaps costing you time and margin. Targeted improvements in your weakest areas could unlock significant growth.' },
    { min: 24, label: 'C', title: 'Growth Bottleneck', color: '#E8943A', badge: 'GRADE C \u2014 GROWTH BOTTLENECK', desc: 'Your operation is hitting a ceiling. Manual processes are eating your time, costing errors are eroding margins, and compliance gaps are a risk. Systemizing your operations would have immediate impact.' },
    { min: 12, label: 'D', title: 'Critical Overload', color: '#c44444', badge: 'GRADE D \u2014 CRITICAL', desc: 'You are the system. Everything runs through you, and it\u2019s unsustainable. Without changes, growth is impossible and an FDA audit could be devastating. The good news: the biggest gains come from starting here.' },
  ];

  function getGrade(score) {
    return GRADES.find(g => score >= g.min) || GRADES[GRADES.length - 1];
  }

  function getCategoryScores(scores) {
    return CATEGORIES.map(cat => {
      const qs = QUESTIONS.filter(q => q.category === cat);
      const catScore = qs.reduce((sum, q, i) => {
        const qIdx = QUESTIONS.indexOf(q);
        return sum + (scores[qIdx] || 0);
      }, 0);
      const max = qs.length * 4;
      const pct = Math.round((catScore / max) * 100);
      return { category: cat, score: catScore, max, pct };
    });
  }

  let state = { screen: 'quiz', currentQ: 0, answers: [], scores: [] };

  function render() {
    const area = document.getElementById('quiz-area');
    area.innerHTML = '';
    void area.offsetWidth;
    area.className = 'slide-in';

    if (state.screen === 'quiz') {
      document.getElementById('progress-wrap').style.display = 'block';
      updateProgress();
      area.innerHTML = renderQuestion();
    } else {
      document.getElementById('progress-wrap').style.display = 'none';
      area.innerHTML = renderResult();
      setTimeout(() => {
        const fill = document.getElementById('score-bar-fill');
        if (fill) {
          const total = state.scores.reduce((a, b) => a + b, 0);
          fill.style.width = Math.round((total / MAX_SCORE) * 100) + '%';
        }
        document.querySelectorAll('.cat-bar-fill').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }, 100);
    }
  }

  function renderQuestion() {
    const q = QUESTIONS[state.currentQ];
    const total = QUESTIONS.length;
    const selected = state.answers[state.currentQ];
    const keys = ['A', 'B', 'C', 'D'];
    return `
      <div class="card">
        <div class="question-num">${q.category} &middot; Question ${state.currentQ + 1} of ${total}</div>
        <div class="question-text">${q.text}</div>
        <div class="options">
          ${q.options.map((opt, i) => `
            <button class="option ${selected === i ? 'selected' : ''}" onclick="selectAnswer(${i})">
              <span class="option-key">${keys[i]}</span>
              <span>${opt.label}</span>
            </button>
          `).join('')}
        </div>
        <div class="nav">
          ${state.currentQ > 0 ? '<button class="btn btn-ghost" onclick="goBack()">&larr; Back</button>' : ''}
          <button class="btn btn-primary" onclick="goNext()" ${selected === undefined ? 'disabled' : ''} id="next-btn">
            ${state.currentQ === total - 1 ? 'See My Results &rarr;' : 'Next &rarr;'}
          </button>
        </div>
      </div>
    `;
  }

  function renderResult() {
    const total = state.scores.reduce((a, b) => a + b, 0);
    const pct = Math.round((total / MAX_SCORE) * 100);
    const grade = getGrade(total);
    const catScores = getCategoryScores(state.scores);
    const weakest = [...catScores].sort((a, b) => a.pct - b.pct).slice(0, 2);

    const catBarsHtml = catScores.map(cs => {
      const barColor = cs.pct >= 75 ? 'var(--accent)' : cs.pct >= 50 ? 'var(--warn)' : '#c44';
      const pctColor = cs.pct >= 75 ? 'var(--accent)' : cs.pct >= 50 ? 'var(--warn)' : '#c44';
      return `
        <div class="cat-row">
          <div class="cat-header">
            <span class="cat-name">${cs.category}</span>
            <span class="cat-pct" style="color:${pctColor}">${cs.pct}%</span>
          </div>
          <div class="cat-bar">
            <div class="cat-bar-fill" data-pct="${cs.pct}" style="background:${barColor};width:0%"></div>
          </div>
        </div>
      `;
    }).join('');

    const oppHtml = weakest.map(w => `
      <div class="opp-item">
        <div class="opp-cat" style="color:#c44">${w.category} (${w.pct}%)</div>
        <div class="opp-rec">${CATEGORY_RECOMMENDATIONS[w.category]}</div>
      </div>
    `).join('');

    const badgeBg = grade.color === '#c44444' ? 'rgba(204,68,68,0.12)' :
                    grade.color === '#E8943A' ? 'rgba(232,148,58,0.12)' :
                    'rgba(63,184,196,0.12)';

    return `
      <div class="result-card">
        <div class="result-header">
          <div class="tier-badge" style="background:${badgeBg};color:${grade.color};border:1px solid ${grade.color}40">${grade.badge}</div>
          <div class="result-score" style="color:${grade.color}">${total}<span style="font-size:32px;color:var(--muted)">/${MAX_SCORE}</span></div>
          <div class="result-label">${grade.title}</div>
          <div class="result-desc">${grade.desc}</div>
          <div class="score-bar-wrap"><div class="score-bar-fill" id="score-bar-fill" style="background:${grade.color};width:0%"></div></div>
        </div>
        <div class="audit-section">
          <div class="audit-title">Breakdown by Category</div>
          ${catBarsHtml}
        </div>
        <div class="opp-section">
          <div class="audit-title">Your Biggest Opportunities</div>
          ${oppHtml}
        </div>
        <div class="cta-section">
          <div class="cta-title">Want a Deeper Look?</div>
          <div class="cta-sub">Book a free 20-minute call and we'll walk through your results together with specific recommendations for your operation.</div>
          <div class="cta-buttons">
            <a href="https://calendly.com/chiomaodo/intro-call" target="_blank" class="btn-cta btn-calendly">Book a Free Call &rarr;</a>
            <button class="btn-restart" onclick="restart()">Start Over</button>
          </div>
        </div>
      </div>
    `;
  }

  function updateProgress() {
    const total = QUESTIONS.length;
    const pct = Math.round((state.currentQ / total) * 100);
    document.getElementById('progress-label').textContent = 'Question ' + (state.currentQ + 1) + ' of ' + total;
    document.getElementById('progress-cat').textContent = QUESTIONS[state.currentQ].category;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function selectAnswer(idx) {
    state.answers[state.currentQ] = idx;
    var btn = document.getElementById('next-btn');
    if (btn) btn.disabled = false;
    document.querySelectorAll('.option').forEach(function(el, i) {
      el.className = 'option' + (i === idx ? ' selected' : '');
    });
  }

  function goNext() {
    var selected = state.answers[state.currentQ];
    if (selected === undefined) return;
    state.scores[state.currentQ] = QUESTIONS[state.currentQ].options[selected].score;
    if (state.currentQ < QUESTIONS.length - 1) {
      state.currentQ++;
      render();
    } else {
      state.screen = 'result';
      render();
    }
  }

  function goBack() {
    if (state.currentQ > 0) { state.currentQ--; render(); }
  }

  function restart() {
    state = { screen: 'quiz', currentQ: 0, answers: [], scores: [] };
    render();
  }

  render();
</script>
</body>
</html>
