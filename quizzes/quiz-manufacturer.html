<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Manufacturer Ops Audit — JoeLuT AI</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #3FB8C4;
    --accent2: #00D4FF;
    --dark: #080C10;
    --surface: #0D1218;
    --card: #111820;
    --border: #1E2D3A;
    --text: #FFFFFF;
    --muted: #6B8799;
    --warn: #E8943A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: "Barlow", sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(63,184,196,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container { width: 100%; max-width: 640px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 40px; animation: fadeUp 0.6s ease both; }
  .logo-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(63,184,196,0.4);
    padding: 5px 14px;
    margin-bottom: 20px;
    border-radius: 2px;
  }
  h1 { font-family: "Barlow Condensed", sans-serif; font-size: clamp(32px, 7vw, 52px); font-weight: 800; line-height: 1.05; color: var(--text); margin-bottom: 12px; letter-spacing: -0.01em; text-transform: uppercase; }
  h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 460px; margin: 0 auto; font-weight: 400; }
  .progress-wrap { margin-bottom: 32px; animation: fadeUp 0.6s 0.1s ease both; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }
  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 36px; animation: fadeUp 0.5s ease both; position: relative; overflow: hidden; }
  .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .question-num { font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; font-weight: 600; }
  .question-text { font-family: "Barlow Condensed", sans-serif; font-size: clamp(20px, 4vw, 28px); font-weight: 700; line-height: 1.25; margin-bottom: 28px; color: var(--text); text-transform: uppercase; letter-spacing: 0.01em; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 15px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    font-family: "Barlow", sans-serif;
    font-size: 14px;
    color: #AABCC8;
    line-height: 1.5;
    font-weight: 400;
  }
  .option:hover { border-color: rgba(63,184,196,0.5); background: rgba(63,184,196,0.05); transform: translateX(3px); color: var(--text); }
  .option.selected { border-color: var(--accent); background: rgba(63,184,196,0.08); color: var(--text); }
  .option-key { font-size: 10px; color: var(--accent); font-weight: 700; flex-shrink: 0; width: 16px; padding-top: 2px; letter-spacing: 0.05em; }
  .option.selected .option-key { color: var(--accent2); }
  .nav { display: flex; gap: 12px; margin-top: 28px; justify-content: flex-end; }
  .btn { font-family: "Barlow", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 12px 28px; border-radius: 4px; cursor: pointer; transition: all 0.2s ease; border: none; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: var(--dark); font-weight: 800; }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; animation: fadeUp 0.6s ease both; }
  .result-header { padding: 36px; position: relative; border-bottom: 1px solid var(--border); }
  .tier-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; padding: 5px 14px; border-radius: 2px; margin-bottom: 20px; }
  .result-score { font-family: "Barlow Condensed", sans-serif; font-size: 80px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .result-label { font-family: "Barlow Condensed", sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.02em; }
  .result-desc { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 480px; font-weight: 400; }
  .score-bar-wrap { margin-top: 24px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s; }
  .audit-section { padding: 28px 36px; border-bottom: 1px solid var(--border); }
  .audit-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; font-weight: 700; }
  .audit-items { display: flex; flex-direction: column; gap: 10px; }
  .audit-item { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #AABCC8; }
  .audit-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-good { background: var(--accent); box-shadow: 0 0 6px rgba(63,184,196,0.5); }
  .dot-warn { background: var(--warn); }
  .dot-bad { background: #c44; }
  .cta-section { padding: 28px 36px; }
  .cta-title { font-family: "Barlow Condensed", sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.02em; }
  .cta-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .cta-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-cta { font-family: "Barlow", sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px 28px; border-radius: 4px; cursor: pointer; transition: all 0.2s ease; border: none; text-decoration: none; display: inline-block; }
  .btn-calendly { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: var(--dark); }
  .btn-calendly:hover { opacity: 0.88; transform: translateY(-2px); }
  .btn-restart { background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: "Barlow", sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 28px; border-radius: 4px; transition: all 0.2s; }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .slide-in { animation: fadeUp 0.4s ease both; }
  .footer { text-align: center; margin-top: 28px; font-size: 11px; color: var(--muted); animation: fadeUp 0.6s 0.2s ease both; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
  @media (max-width: 480px) {
    .card { padding: 24px; }
    .result-header { padding: 24px; }
    .audit-section, .cta-section { padding: 20px 24px; }
    .result-score { font-size: 60px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-tag">JoeLuT AI · Manufacturing Audit</div>
    <h1>Can We Work<br><span>Together?</span></h1>
    <p class="subtitle">A 2-minute ops audit for food manufacturers. Find out where your production business stands — and where AI automation can move the needle.</p>
  </div>
  <div id="progress-wrap" class="progress-wrap" style="display:none;">
    <div class="progress-meta">
      <span id="progress-label">Question 1 of 8</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div id="quiz-area"></div>
  <div class="footer">Powered by JoeLuT AI · joelutai.com</div>
</div>

<script>
  const QUESTIONS = [
    {
      id: 'cost',
      text: 'Do you know your unit production cost for each SKU — off the top of your head?',
      options: [
        { label: 'Yes — tracked in a spreadsheet or production system', score: 3 },
        { label: 'Roughly — I estimate but it\'s not precise', score: 1 },
        { label: 'Not really, I go by feel or past experience', score: 0 },
      ]
    },
    {
      id: 'inventory',
      text: 'How do you currently track raw material inventory?',
      options: [
        { label: 'Digital system — updated regularly with accurate counts', score: 3 },
        { label: 'Handwritten logs or occasional spot checks', score: 1 },
        { label: 'I don\'t track it consistently', score: 0 },
      ]
    },
    {
      id: 'compliance',
      text: 'Are you familiar with FSMA 204 traceability requirements for your product category?',
      options: [
        { label: 'Yes — we have a traceability system in place', score: 3 },
        { label: 'I\'ve heard of it but haven\'t implemented anything yet', score: 1 },
        { label: 'No — this is new to me', score: 0 },
      ]
    },
    {
      id: 'orders',
      text: 'When a wholesale or co-packing order comes in, how do you process it?',
      options: [
        { label: 'Documented process — steps written out or systemized', score: 3 },
        { label: 'I handle it manually each time, mostly from memory', score: 1 },
        { label: 'It\'s chaotic — no set process yet', score: 0 },
      ]
    },
    {
      id: 'bottleneck',
      text: 'What\'s your biggest operational bottleneck right now?',
      options: [
        { label: 'Tracking costs, orders, or inventory (data problems)', score: 3 },
        { label: 'Customer communication or follow-up (time problems)', score: 2 },
        { label: 'I\'m not sure — I just know something feels off', score: 1 },
      ]
    },
    {
      id: 'inventory_cost_lag',
      text: 'When ingredient costs or inventory levels change, how quickly does that show up in your unit cost?',
      options: [
        { label: 'Same day or within the week — my cost sheet updates automatically or I recalculate right away', score: 3 },
        { label: 'Eventually — I catch it when I do a monthly review or notice margin shrinking', score: 1 },
        { label: 'Honestly, I\'m not sure — cost changes often go unnoticed until it\'s a problem', score: 0 },
      ]
    },
    {
      id: 'invoice_processing',
      text: 'How do you currently handle supplier invoices when they come in?',
      options: [
        { label: 'Digital — invoices are logged into a system and matched to orders automatically or same day', score: 3 },
        { label: 'Manual entry — I type or copy the details into a spreadsheet or accounting software myself', score: 1 },
        { label: 'Paper or email filing — invoices are stored but rarely entered into any system', score: 0 },
      ]
    },
    {
      id: 'openness',
      text: 'How open is your team to adopting new digital tools or automation?',
      options: [
        { label: 'Very — we actively look for tools that save time', score: 3 },
        { label: 'Open, but cautious about disrupting what works', score: 2 },
        { label: 'Skeptical — it takes a lot to get buy-in here', score: 0 },
      ]
    },
  ];

  const TIERS = [
    {
      min: 0, max: 7,
      label: 'Not Ready Yet',
      badgeBg: 'rgba(204,68,68,0.12)',
      badgeColor: '#c44444',
      badge: 'TIER 1 — FOUNDATION NEEDED',
      desc: 'Your production is running on intuition and manual effort. Before AI can help you scale, there are foundational systems to put in place — but that\'s exactly what we build. The opportunity here is enormous.',
      cta: 'Let\'s talk about where to start.',
      next: 'A free 20-minute call to map out the 3 systems your manufacturing operation needs first.'
    },
    {
      min: 8, max: 13,
      label: 'Emerging',
      badgeBg: 'rgba(232,148,58,0.12)',
      badgeColor: '#E8943A',
      badge: 'TIER 2 — GETTING THERE',
      desc: 'You have the basics in place but things are slipping through the cracks. Manual tracking is costing you time and margin. The right automation layer could change your production week dramatically.',
      cta: 'Ready to stop doing it manually.',
      next: 'A 30-minute discovery call to identify your highest-ROI automation opportunity.'
    },
    {
      min: 14, max: 19,
      label: 'Automation-Ready',
      badgeBg: 'rgba(63,184,196,0.12)',
      badgeColor: '#3FB8C4',
      badge: 'TIER 3 — STRONG FOUNDATION',
      desc: 'You\'ve built real operational discipline. Your data is reasonably clean, your processes are mostly documented, and your team is open to change. AI automation will stack directly on what\'s already working.',
      cta: 'Let\'s build something powerful.',
      next: 'A 45-minute strategy session to scope your first AI workflow.'
    },
    {
      min: 20, max: 24,
      label: 'Prime Fit',
      badgeBg: 'rgba(63,184,196,0.15)',
      badgeColor: '#3FB8C4',
      badge: 'TIER 4 — TOP OF THE LIST',
      desc: 'You\'re already operating with the mindset of a modern food manufacturer. You track what matters, you\'re open to technology, and you have real pain points AI can solve fast. Clients like you see the clearest ROI.',
      cta: 'You\'re exactly who we built this for.',
      next: 'Let\'s get into a full AI Ops audit and build your production automation roadmap.'
    },
  ];

  function getTier(score) {
    return TIERS.find(t => score >= t.min && score <= t.max) || TIERS[0];
  }

  let state = { screen: 'quiz', currentQ: 0, answers: [], scores: [] };

  function render() {
    const area = document.getElementById('quiz-area');
    area.innerHTML = '';
    void area.offsetWidth;
    area.className = 'slide-in';

    if (state.screen === 'quiz') {
      document.getElementById('progress-wrap').style.display = 'block';
      updateProgress();
      area.innerHTML = renderQuestion();
    } else {
      document.getElementById('progress-wrap').style.display = 'none';
      area.innerHTML = renderResult();
      setTimeout(() => {
        const fill = document.getElementById('score-bar-fill');
        if (fill) {
          const total = state.scores.reduce((a, b) => a + b, 0);
          fill.style.width = Math.round((total / 24) * 100) + '%';
        }
      }, 100);
    }
  }

  function renderQuestion() {
    const q = QUESTIONS[state.currentQ];
    const total = QUESTIONS.length;
    const selected = state.answers[state.currentQ];
    const keys = ['A', 'B', 'C'];
    return `
      <div class="card">
        <div class="question-num">Question ${state.currentQ + 1} of ${total}</div>
        <div class="question-text">${q.text}</div>
        <div class="options">
          ${q.options.map((opt, i) => `
            <button class="option ${selected === i ? 'selected' : ''}" onclick="selectAnswer(${i})">
              <span class="option-key">${keys[i]}</span>
              <span>${opt.label}</span>
            </button>
          `).join('')}
        </div>
        <div class="nav">
          ${state.currentQ > 0 ? `<button class="btn btn-ghost" onclick="goBack()">← Back</button>` : ''}
          <button class="btn btn-primary" onclick="goNext()" ${selected === undefined ? 'disabled' : ''} id="next-btn">
            ${state.currentQ === total - 1 ? 'See My Results →' : 'Next →'}
          </button>
        </div>
      </div>
    `;
  }

  function renderResult() {
    const total = state.scores.reduce((a, b) => a + b, 0);
    const pct = Math.round((total / 24) * 100);
    const tier = getTier(total);
    const auditItems = QUESTIONS.map((q, i) => {
      const score = state.scores[i];
      const dotClass = score >= 3 ? 'dot-good' : score >= 1 ? 'dot-warn' : 'dot-bad';
      const status = score >= 3 ? 'Strong' : score >= 1 ? 'Needs work' : 'Gap identified';
      const shortQ = q.text.split('?')[0].replace(/^(Do you|How do you|Are you|When a|Have you|What's)/, '').trim();
      const label = shortQ.length > 52 ? shortQ.slice(0, 52) + '...' : shortQ;
      return `<div class="audit-item"><span class="audit-dot ${dotClass}"></span><span>${label} — <span style="color:var(--muted)">${status}</span></span></div>`;
    }).join('');

    return `
      <div class="result-card">
        <div class="result-header">
          <div class="tier-badge" style="background:${tier.badgeBg};color:${tier.badgeColor};border:1px solid ${tier.badgeColor}40">${tier.badge}</div>
          <div class="result-score" style="color:${tier.badgeColor}">${pct}<span style="font-size:32px;color:var(--muted)">%</span></div>
          <div class="result-label">${tier.label}</div>
          <div class="result-desc">${tier.desc}</div>
          <div class="score-bar-wrap"><div class="score-bar-fill" id="score-bar-fill" style="background:${tier.badgeColor};width:0%"></div></div>
        </div>
        <div class="audit-section">
          <div class="audit-title">📋 Your Manufacturing Ops Snapshot</div>
          <div class="audit-items">${auditItems}</div>
        </div>
        <div class="cta-section">
          <div class="cta-title">${tier.cta}</div>
          <div class="cta-sub">${tier.next}</div>
          <div class="cta-buttons">
            <a href="https://calendly.com/chiomaodo/intro-call" target="_blank" class="btn-cta btn-calendly">Book a Free Call →</a>
            <button class="btn-restart" onclick="restart()">Start Over</button>
          </div>
        </div>
      </div>
    `;
  }

  function updateProgress() {
    const total = QUESTIONS.length;
    const pct = Math.round((state.currentQ / total) * 100);
    document.getElementById('progress-label').textContent = `Question ${state.currentQ + 1} of ${total}`;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function selectAnswer(idx) {
    state.answers[state.currentQ] = idx;
    const btn = document.getElementById('next-btn');
    if (btn) btn.disabled = false;
    document.querySelectorAll('.option').forEach((el, i) => {
      el.className = 'option' + (i === idx ? ' selected' : '');
      el.querySelector('.option-key').style.color = i === idx ? 'var(--teal)' : 'var(--orange)';
    });
  }

  function goNext() {
    const selected = state.answers[state.currentQ];
    if (selected === undefined) return;
    state.scores[state.currentQ] = QUESTIONS[state.currentQ].options[selected].score;
    if (state.currentQ < QUESTIONS.length - 1) {
      state.currentQ++;
      render();
    } else {
      state.screen = 'result';
      render();
    }
  }

  function goBack() {
    if (state.currentQ > 0) { state.currentQ--; render(); }
  }

  function restart() {
    state = { screen: 'quiz', currentQ: 0, answers: [], scores: [] };
    render();
  }

  render();
</script>
</body>
</html>
